
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Fantasy RPG</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app-container">
    
    <div id="auth-screen">
        <div class="auth-box fade-in">
            <h1 style="color:var(--gold); margin-bottom:30px;"><i class="fa-solid fa-dragon"></i> RPG LEGENDS</h1>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Пароль">
            <input type="text" id="nickname" placeholder="Никнейм (для новых)">
            <button class="btn-primary" onclick="login()">Войти</button>
            <button class="btn-primary" style="background:transparent; border:1px solid #555" onclick="register()">Регистрация</button>
            <p id="auth-error" style="color:red; margin-top:10px"></p>
        </div>
    </div>

    <div id="game-screen" style="display: none;">
        
        <header>
            <div class="level-info">
                <span id="user-level">LVL 1</span>
                <span id="exp-text">0%</span>
            </div>
            <div class="xp-bar-bg"><div class="xp-bar-fill" id="exp-bar"></div></div>

            <div class="currency-bar">
                <div class="gold"><i class="fa-solid fa-coins"></i> <span id="res-gold">0</span></div>
                <div class="silver"><i class="fa-regular fa-gem"></i> <span id="res-silver">0</span></div>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <i class="fa-solid fa-khanda" style="color:#ff6b6b"></i> 
                    <span id="stat-str">0</span>
                    <span id="stat-str-bonus" style="color:var(--green); font-size:0.8em"></span>
                </div>
                <div class="stat-item">
                    <i class="fa-solid fa-heart" style="color:#ff4d4d"></i> 
                    <span id="stat-hp">0</span>
                </div>
                <div class="stat-item">
                    <i class="fa-solid fa-shield-halved" style="color:#4caf50"></i> 
                    <span id="stat-def">0</span>
                    <span id="stat-def-bonus" style="color:var(--green); font-size:0.8em"></span>
                </div>
            </div>
        </header>

        <main id="content-area" class="fade-in"></main>
    </div>

    <nav class="bottom-nav" id="nav-bar" style="display:none;">
        <button class="nav-item" onclick="renderLocation('profile')" id="nav-profile">
            <i class="fa-solid fa-user-astronaut"></i> Герой
        </button>
        <button class="nav-item" onclick="renderLocation('dungeon')" id="nav-dungeon">
            <i class="fa-solid fa-skull"></i> Бой
        </button>
        <button class="nav-item" onclick="renderLocation('clan')" id="nav-clan">
            <i class="fa-solid fa-users"></i> Клан
        </button>
        <button class="nav-item" onclick="renderLocation('shop')" id="nav-shop">
            <i class="fa-solid fa-bag-shopping"></i> Маг.
        </button>
        <button class="nav-item" onclick="renderLocation('chat')" id="nav-chat">
            <i class="fa-solid fa-comments"></i> Чат
        </button>
        <button class="nav-item" onclick="renderLocation('forum')" id="nav-forum">
            <i class="fa-solid fa-newspaper"></i> Форум
        </button>
        <button class="nav-item" onclick="renderLocation('admin')" id="nav-admin" style="display:none; color: #ff4d4d;">
            <i class="fa-solid fa-lock"></i> Adm
        </button>
    </nav>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
